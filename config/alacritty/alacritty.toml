[general]
import = [
    "~/.config/alacritty/themes/themes/one_dark.toml"
]

live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
# italic = { family = "JetBrains Nerd Font", style = "Italic" }
# bold_italic = { family = "JetBrains Nerd Font", style = "Bold Italic" }
size = 14.0
offset = { x = 0, y = 0}
glyph_offset = { x = 0, y = 0}


[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 0.85

[window.dimensions]
columns = 100
lines = 30

[selection]
save_to_clipboard = true

[terminal.shell]
program = "/usr/bin/zsh"
